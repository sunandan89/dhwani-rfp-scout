name: Dhwani RFP Scout

on:
  schedule:
    - cron: '30 2 * * 1-6'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode - scrape first 3 RFPs only'
        required: false
        default: 'false'
        type: boolean
      min_score:
        description: 'Minimum relevance score to include (0-10)'
        required: false
        default: '5'

jobs:
  rfp-scout:
    name: Scrape - Score - Excel - Email
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RFP Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENTS:  ${{ secrets.EMAIL_RECIPIENTS }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP_HOST:   ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT:   ${{ secrets.EMAIL_SMTP_PORT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          if [ -n "${{ github.event.inputs.min_score }}" ]; then
            ARGS="$ARGS --min-score ${{ github.event.inputs.min_score }}"
          fi
          python rfp_scout.py $ARGS

      - name: Commit daily results
        run: |
          git config user.name  "Dhwani RFP Bot"
          git config user.email "rfp-scout@dhwaniris.in"
          git add rfp_output/ || true
          git diff --staged --quiet || git commit -m "RFP digest $(date +'%d %b %Y') - auto-generated"
          git push || echo "Nothing to push"

      - name: Upload results as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rfp-digest-${{ github.run_number }}
          path: rfp_output/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          TODAY=$(date +'%d %B %Y')
          LOG=$(ls rfp_output/*/rfp_run_log.json 2>/dev/null | tail -1)
          echo "## Dhwani RFP Scout - $TODAY" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "$LOG" ]; then
            TOTAL=$(python3 -c "import json; d=json.load(open('$LOG')); print(d.get('total_scraped',0))")
            RELEVANT=$(python3 -c "import json; d=json.load(open('$LOG')); print(d.get('relevant_count',0))")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| RFPs scraped | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Shortlisted | $RELEVANT |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Score | Rec | Title | Organization | Deadline |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-----|-------|--------------|----------|" >> $GITHUB_STEP_SUMMARY
            python3 scripts/rfp_summary.py "$LOG" >> $GITHUB_STEP_SUMMARY
          else
            echo "No log file found." >> $GITHUB_STEP_SUMMARY
          fi
