name: 🎯 Dhwani RFP Scout (mLead)

on:
  # ── Runs every weekday + Saturday at 8:00 AM IST (2:30 AM UTC) ──
  schedule:
    - cron: '30 2 * * 1-6'

  # ── Also allows manual trigger from GitHub UI ──
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (scrape first 3 RFPs only)'
        required: false
        default: 'false'
        type: boolean
      min_score:
        description: 'Minimum relevance score to include (0-10)'
        required: false
        default: '5'

jobs:
  rfp-scout:
    name: Scrape · Score · Draft · Notify
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit results back to repo

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Run the RFP Scout ───────────────────────────────────
      - name: Run RFP Scout
        env:
          # Add these as GitHub Secrets in your repo settings:
          # Settings → Secrets and variables → Actions → New repository secret
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # Optional — enables AI scoring + proposals
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}         # your-email@domain.com
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}       # App password (NOT your login password)
          EMAIL_RECIPIENTS:  ${{ secrets.EMAIL_RECIPIENTS }}     # comma-separated: a@x.com,b@x.com
          EMAIL_SMTP_HOST:   ${{ secrets.EMAIL_SMTP_HOST }}      # smtp.office365.com  (Outlook)
          EMAIL_SMTP_PORT:   ${{ secrets.EMAIL_SMTP_PORT }}      # 587
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          if [ -n "${{ github.event.inputs.min_score }}" ]; then
            ARGS="$ARGS --min-score ${{ github.event.inputs.min_score }}"
          fi
          python rfp_agent.py $ARGS
          echo "RFP_OUTPUT_DIR=$(ls -d rfp_output/*/  | tail -1)" >> $GITHUB_ENV

      # ── 4. Commit results back to repo ────────────────────────
      # Daily digests + proposals are saved to rfp_output/YYYY-MM-DD/
      # and committed so you can browse them anytime on GitHub
      - name: Commit daily results
        run: |
          git config user.name  "mLead Bot 🤖"
          git config user.email "rfp-scout@dhwaniris.in"
          git add rfp_output/ || true
          git diff --staged --quiet || git commit -m "📊 RFP digest $(date +'%d %b %Y') — auto-generated by mLead"
          git push || echo "Nothing to push"

      # ── 5. Upload proposals as downloadable artifacts ─────────
      # Accessible from the Actions tab → run → Artifacts
      - name: Upload proposals & digest as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rfp-digest-${{ github.run_number }}-${{ github.run_attempt }}
          path: rfp_output/
          retention-days: 30   # artifacts kept for 30 days

      # ── 6. Post a run summary to GitHub ───────────────────────
      - name: Write job summary
        if: always()
        run: |
          TODAY=$(date +'%d %B %Y')
          echo "## 🎯 Dhwani RFP Scout — $TODAY" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse the JSON log if it exists
          LOG=$(ls rfp_output/*/rfp_run_log.json 2>/dev/null | tail -1)
          if [ -f "$LOG" ]; then
            TOTAL=$(python3 -c "import json; d=json.load(open('$LOG')); print(d['total_scraped'])")
            RELEVANT=$(python3 -c "import json; d=json.load(open('$LOG')); print(d['relevant_count'])")
            PROPOSALS=$(python3 -c "import json; d=json.load(open('$LOG')); print(d['proposals_drafted'])")

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| RFPs scraped | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Relevant (score ≥ 5) | $RELEVANT |" >> $GITHUB_STEP_SUMMARY
            echo "| Proposals drafted | $PROPOSALS |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### Shortlisted RFPs" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Score | Recommendation | Title | Organization | Deadline |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|---------------|-------|-------------|---------|" >> $GITHUB_STEP_SUMMARY
            python3 - <<'PYEOF'
          import json, os
          log = os.environ.get('LOG', '')
          with open('$LOG') as f:
              data = json.load(f)
          for r in data['rfps']:
              if r.get('recommendation') in ('apply','consider'):
                  score = r.get('score', 0)
                  rec_icon = '✅' if r['recommendation'] == 'apply' else '🤔'
                  title = r['title'][:55]
                  org = r['organization'][:40]
                  deadline = r.get('deadline', 'N/A')
                  url = r.get('url', '#')
                  print(f"| {score}/10 | {rec_icon} {r['recommendation'].upper()} | [{title}]({url}) | {org} | {deadline} |")
          PYEOF
          else
            echo "⚠️ No log file found — check run logs for details." >> $GITHUB_STEP_SUMMARY
          fi
